name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - 'fastapi-server/**'
      - 'streamlit-app/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend (fastapi-server)
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi-server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/car-damage-backend:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend (streamlit-app)
        uses: docker/build-push-action@v5
        with:
          context: ./streamlit-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/car-damage-frontend:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max